<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/svg+xml" href="telekom-logo.svg" />
  <title>Telekom Tech Challenge</title>
  <style>
    :root {
      --brand: #e20074;
      --brand-dark: #b0005a;
      --brand-soft: #ffe6f3;
      --bg: #f6f6f8;
      --card: #ffffff;
      --text: #17171a;
      --muted: #686878;
      --success: #12805c;
      --warning: #a15c00;
      --danger: #b42318;
      --border: #e7e7ee;
      --shadow: 0 12px 32px rgba(0,0,0,.08);
      --radius: 22px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, var(--brand-soft), transparent 30rem),
        linear-gradient(180deg, #fff, var(--bg));
      color: var(--text);
      min-height: 100vh;
    }
    a { color: inherit; }
    .app-shell { width: min(1100px, 100%); margin: 0 auto; padding: 18px; }
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 14px; padding: 14px 0 22px; flex-wrap: wrap;
    }
    .brand-block { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .brand-logo {
      width: 48px; height: 48px; border-radius: 14px; object-fit: contain;
      background: var(--brand); color: white; display: grid; place-items: center;
      font-weight: 900; font-size: 28px; box-shadow: var(--shadow);
      overflow: hidden; flex: 0 0 auto;
    }
    .brand-logo img { width: 100%; height: 100%; object-fit: contain; padding: 6px; }
    .brand-title { min-width: 0; }
    .brand-title h1 { margin: 0; font-size: clamp(1.35rem, 5vw, 2.4rem); line-height: 1.05; }
    .brand-title p { margin: 4px 0 0; color: var(--muted); font-size: .95rem; }
    .nav-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .btn {
      border: 0; border-radius: 999px; padding: 11px 15px; font-weight: 750;
      cursor: pointer; background: #fff; color: var(--text);
      box-shadow: 0 3px 12px rgba(0,0,0,.07);
      transition: transform .12s ease, box-shadow .12s ease, background .12s ease;
      text-decoration: none; display: inline-flex; align-items: center;
      justify-content: center; gap: 8px; min-height: 42px; touch-action: manipulation;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(0,0,0,.1); }
    .btn:active { transform: translateY(0); }
    .btn:focus-visible {
      outline: 3px solid color-mix(in srgb, var(--brand) 35%, transparent);
      outline-offset: 2px;
    }
    .btn.primary { background: var(--brand); color: white; }
    .btn.secondary { background: var(--brand-soft); color: var(--brand-dark); }
    .btn.ghost { background: transparent; box-shadow: none; border: 1px solid var(--border); }
    .btn.danger { background: #fff2f0; color: var(--danger); }
    .btn.full { width: 100%; }
    .btn[disabled] { opacity: .55; cursor: not-allowed; transform: none; }
    .lang-switch {
      display: inline-flex; border: 1px solid var(--border); border-radius: 999px;
      background: #fff; padding: 3px; box-shadow: 0 3px 12px rgba(0,0,0,.07);
      overflow: hidden;
    }
    .lang-switch button {
      border: 0; background: transparent; padding: 7px 12px; font-weight: 800;
      color: var(--muted); cursor: pointer; border-radius: 999px; min-height: 36px;
      font-size: .9rem;
    }
    .lang-switch button.active { background: var(--brand); color: white; }
    .lang-switch button:focus-visible {
      outline: 3px solid color-mix(in srgb, var(--brand) 35%, transparent);
    }
    .hero-card, .panel, .challenge-card {
      background: rgba(255,255,255,.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.8);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .hero-card { padding: 18px; display: grid; gap: 16px; margin-bottom: 18px; }
    .stats-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
    .stat { padding: 14px; border-radius: 18px; background: #fff; border: 1px solid var(--border); }
    .stat strong { display: block; font-size: 1.35rem; line-height: 1.1; }
    .stat span { color: var(--muted); font-size: .85rem; }
    .progress-wrap { display: grid; gap: 7px; }
    .progress-label {
      display: flex; justify-content: space-between; gap: 10px;
      font-size: .92rem; color: var(--muted);
    }
    .progress-bar { height: 12px; background: #ececf2; border-radius: 999px; overflow: hidden; }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--brand), var(--brand-dark));
      border-radius: 999px; width: 0%; transition: width .3s ease;
    }
    .completion-box {
      display: none; padding: 18px; border-radius: 20px;
      background: linear-gradient(135deg, var(--brand), var(--brand-dark));
      color: white; margin-bottom: 18px; box-shadow: var(--shadow);
    }
    .completion-box.show { display: grid; gap: 8px; }
    .completion-box h2 { margin: 0; font-size: 1.4rem; }
    .completion-box p { margin: 0; opacity: .95; }
    .section-title {
      display: flex; align-items: end; justify-content: space-between;
      gap: 10px; margin: 22px 0 12px; flex-wrap: wrap;
    }
    .section-title > div { min-width: 0; }
    .section-title h2 { margin: 0; font-size: 1.25rem; }
    .section-title p { margin: 0; color: var(--muted); font-size: .92rem; }
    .challenge-grid {
      display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px;
    }
    .challenge-card {
      position: relative; padding: 16px; display: grid; gap: 12px;
      min-height: 220px; overflow: hidden;
    }
    .challenge-card.done::before {
      content: ""; position: absolute; inset: 0;
      border: 2px solid rgba(18,128,92,.35); border-radius: var(--radius);
      pointer-events: none;
    }
    .card-top { display: flex; justify-content: space-between; gap: 10px; align-items: start; }
    .icon-badge {
      width: 44px; height: 44px; display: grid; place-items: center;
      border-radius: 16px; background: var(--brand-soft); color: var(--brand-dark);
      font-size: 1.35rem;
    }
    .status-pill, .difficulty-pill {
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 999px; font-size: .77rem; font-weight: 800; padding: 6px 9px;
      background: #f0f0f5; color: var(--muted); white-space: nowrap;
    }
    .status-pill.done { background: #e7f7ef; color: var(--success); }
    .status-pill.open { background: #fff5dc; color: var(--warning); }
    .difficulty-pill.easy { background: #e7f7ef; color: var(--success); }
    .difficulty-pill.medium { background: #fff5dc; color: var(--warning); }
    .difficulty-pill.hard { background: #fff2f0; color: var(--danger); }
    .challenge-card h3 { margin: 0; font-size: 1.08rem; }
    .challenge-card p { margin: 0; color: var(--muted); line-height: 1.45; }
    .card-meta { display: flex; flex-wrap: wrap; gap: 7px; margin-top: auto; }
    .panel { padding: 18px; margin-bottom: 18px; }
    .view { display: none; }
    .view.active { display: block; }
    .challenge-layout { display: grid; gap: 14px; }
    .challenge-header {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; flex-wrap: wrap;
    }
    .challenge-header > div { min-width: 0; flex: 1 1 220px; }
    .challenge-header h2 { margin: 0; }
    .story-box {
      padding: 15px; border-radius: 18px; background: #fff;
      border: 1px solid var(--border); line-height: 1.5;
    }
    .question-box { display: grid; gap: 12px; }
    pre {
      margin: 0; background: #17171a; color: #f6f6f8; padding: 14px;
      border-radius: 16px; overflow-x: auto; -webkit-overflow-scrolling: touch;
      max-width: 100%;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: .9rem; line-height: 1.5; white-space: pre;
    }
    .choice-grid { display: grid; gap: 10px; }
    .choice {
      width: 100%; text-align: left; border: 1px solid var(--border);
      border-radius: 16px; padding: 13px 14px; background: #fff;
      cursor: pointer; font-weight: 650; line-height: 1.35;
      min-height: 48px; touch-action: manipulation;
    }
    .choice:focus-visible {
      outline: 3px solid color-mix(in srgb, var(--brand) 35%, transparent);
      outline-offset: 2px; border-color: var(--brand);
    }
    .choice:hover { border-color: var(--brand); }
    .choice.selected { border-color: var(--brand); background: var(--brand-soft); }
    .choice.correct { border-color: var(--success); background: #e7f7ef; }
    .choice.wrong { border-color: var(--danger); background: #fff2f0; }
    .feedback {
      display: none; padding: 14px; border-radius: 16px; font-weight: 700;
      line-height: 1.45; word-wrap: break-word; overflow-wrap: anywhere;
    }
    .feedback a { color: inherit; text-decoration: underline; font-weight: 800; }
    .feedback.show { display: block; }
    .feedback.success { background: #e7f7ef; color: var(--success); }
    .feedback.error { background: #fff2f0; color: var(--danger); }
    .feedback.info { background: var(--brand-soft); color: var(--brand-dark); }
    .small-note { color: var(--muted); font-size: .9rem; line-height: 1.45; }
    .footer-note {
      text-align: center; color: var(--muted); font-size: .85rem; padding: 24px 0 8px;
    }
    @media (max-width: 860px) {
      .challenge-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .stats-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 620px) {
      .app-shell { padding: 14px; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .nav-actions { width: 100%; justify-content: space-between; }
      .nav-actions .btn { flex: 1 1 auto; }
      .nav-actions .lang-switch { flex: 0 0 auto; }
      .challenge-grid { grid-template-columns: 1fr; }
      .challenge-header { align-items: flex-start; flex-direction: column; }
      .challenge-header .btn { width: 100%; }
      .section-title .btn { width: 100%; }
      pre { font-size: .82rem; padding: 12px; }
      .choice { padding: 14px; }
    }
    @media (max-width: 380px) {
      .stats-grid { grid-template-columns: 1fr; }
      .stat strong { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-block">
        <div id="brandLogo" class="brand-logo">T</div>
        <div class="brand-title">
          <h1 id="appTitle">Telekom Tech Challenge</h1>
          <p id="appSubtitle"></p>
        </div>
      </div>
      <nav class="nav-actions">
        <div class="lang-switch" role="group" aria-label="Language">
          <button type="button" data-lang="de" onclick="setLanguage('de')">DE</button>
          <button type="button" data-lang="en" onclick="setLanguage('en')">EN</button>
        </div>
        <button id="homeNavButton" class="btn ghost" type="button" onclick="showView('home')"></button>
        <a id="careerNavButton" class="btn secondary" href="https://careers.telekom.com/de/" target="_blank" rel="noopener noreferrer"></a>
      </nav>
    </header>

    <main>
      <section id="homeView" class="view active">
        <div class="hero-card">
          <div class="stats-grid">
            <div class="stat"><strong id="scoreNow">0</strong><span id="labelScoreNow"></span></div>
            <div class="stat"><strong id="scoreMax">0</strong><span id="labelScoreMax"></span></div>
            <div class="stat"><strong id="doneCount">0</strong><span id="labelDone"></span></div>
            <div class="stat"><strong id="missingCount">0</strong><span id="labelMissing"></span></div>
          </div>
          <div class="progress-wrap">
            <div class="progress-label">
              <span id="labelProgress"></span>
              <span id="progressText">0%</span>
            </div>
            <div class="progress-bar" aria-label="Progress">
              <div id="progressFill" class="progress-fill"></div>
            </div>
          </div>
        </div>

        <div id="completionBox" class="completion-box">
          <h2 id="completionTitle"></h2>
          <p id="completionText"></p>
          <a id="completionCareer" class="btn" href="https://careers.telekom.com/de/" target="_blank" rel="noopener noreferrer"></a>
        </div>

        <div class="section-title">
          <div>
            <h2 id="sectionGamesTitle"></h2>
            <p id="sectionGamesSubtitle"></p>
          </div>
          <button id="resetButton" class="btn danger" type="button" onclick="resetProgress()"></button>
        </div>

        <div id="challengeGrid" class="challenge-grid"></div>
      </section>

      <section id="challengeView" class="view">
        <div class="panel challenge-layout">
          <div class="challenge-header">
            <div>
              <span id="challengeDifficulty" class="difficulty-pill medium">Medium</span>
              <h2 id="challengeTitle">Challenge</h2>
              <p id="challengeMeta" class="small-note"></p>
            </div>
            <button id="abortButton" class="btn ghost" type="button" onclick="abortChallenge()"></button>
          </div>
          <div id="challengeStory" class="story-box"></div>
          <div id="challengeContent" class="question-box"></div>
          <div id="challengeFeedback" class="feedback"></div>
          <div id="challengeActions" class="nav-actions"></div>
        </div>
      </section>
    </main>

    <footer class="footer-note">
      <span id="footerHosted"></span>
      <a href="https://github.com/TeleTubbys/TelekomTechChallenge" target="_blank" rel="noopener noreferrer">GitHub Pages</a>
      <span> · </span>
      <span id="footerStorage"></span>
    </footer>
  </div>

  <script>
    /* ============================================================

  <script>
    /* ============================================================
     * ENGINE + I18N RUNTIME
     * ============================================================ */
    function t() { return I18N[state.lang]; }

    function langStorageName() { return `${CONFIG.cookiePrefix}_lang`; }
    function progressStorageName() { return `${CONFIG.cookiePrefix}_progress`; }

    function getCookie(name) {
      const prefix = encodeURIComponent(name) + "=";
      const parts = document.cookie.split(";").map(p => p.trim());
      const found = parts.find(p => p.startsWith(prefix));
      return found ? decodeURIComponent(found.slice(prefix.length)) : null;
    }
    function setCookie(name, value, days = 30) {
      const expires = new Date(Date.now() + days * 864e5).toUTCString();
      document.cookie = `${encodeURIComponent(name)}=${encodeURIComponent(value)}; expires=${expires}; path=/; SameSite=Lax`;
    }
    function deleteCookie(name) {
      document.cookie = `${encodeURIComponent(name)}=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/; SameSite=Lax`;
    }
    function readStoredValue(name) {
      try { const v = localStorage.getItem(name); if (v !== null) return v; } catch {}
      return getCookie(name);
    }
    function writeStoredValue(name, value) {
      try { localStorage.setItem(name, value); } catch {}
      setCookie(name, value, 30);
    }
    function removeStoredValue(name) {
      try { localStorage.removeItem(name); } catch {}
      deleteCookie(name);
    }

    function loadProgress() {
      try { return JSON.parse(readStoredValue(progressStorageName()) || "{}"); }
      catch { return {}; }
    }
    function saveProgress(p) { writeStoredValue(progressStorageName(), JSON.stringify(p)); }

    function detectInitialLang() {
      const stored = readStoredValue(langStorageName());
      if (stored === "de" || stored === "en") return stored;
      const nav = (navigator.language || "de").toLowerCase();
      if (nav.startsWith("en")) return "en";
      return CONFIG.defaultLang || "de";
    }

    function challengeText(challenge) {
      return challenge[state.lang] || challenge.de;
    }

    function difficultyRank(d) {
      const order = CONFIG.difficultyOrder || ["easy", "medium", "hard"];
      const r = order.indexOf(d);
      return r === -1 ? 999 : r;
    }
    function getEnabledChallenges() {
      const byId = new Map(CONFIG.challenges.map(c => [c.id, c]));
      return CONFIG.enabledChallengeIds
        .map((id, index) => ({ challenge: byId.get(id), index }))
        .filter(x => Boolean(x.challenge))
        .sort((a, b) => difficultyRank(a.challenge.difficulty) - difficultyRank(b.challenge.difficulty) || a.index - b.index)
        .map(x => x.challenge);
    }
    function maxScore() { return getEnabledChallenges().reduce((s, c) => s + c.points, 0); }
    function currentScore() {
      const p = loadProgress();
      return getEnabledChallenges().reduce((s, c) => s + (p[c.id]?.completed ? p[c.id].points : 0), 0);
    }
    function completedCount() {
      const p = loadProgress();
      return getEnabledChallenges().filter(c => p[c.id]?.completed).length;
    }
    function difficultyLabel(d) { return t().difficulty[d] || d; }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;").replaceAll("'", "&#039;");
    }

    function applyBranding() {
      document.documentElement.style.setProperty("--brand", CONFIG.brandColor);
      document.documentElement.style.setProperty("--brand-dark", CONFIG.brandDarkColor);
      document.getElementById("appTitle").textContent = CONFIG.appTitle;
      const logo = document.getElementById("brandLogo");
      if (CONFIG.logoUrl) {
        logo.innerHTML = `<img src="${CONFIG.logoUrl}" alt="${CONFIG.companyName} Logo">`;
      } else {
        logo.textContent = CONFIG.companyName.slice(0, 1).toUpperCase();
      }
    }

    function applyStaticI18n() {
      const tr = t();
      document.documentElement.lang = state.lang;
      document.getElementById("appSubtitle").textContent = tr.appSubtitle;
      document.getElementById("homeNavButton").textContent = tr.navHome;
      const career = document.getElementById("careerNavButton");
      career.textContent = tr.navCareer;
      career.href = tr.careerUrl;
      const careerCompletion = document.getElementById("completionCareer");
      careerCompletion.textContent = tr.navCareer;
      careerCompletion.href = tr.careerUrl;
      document.getElementById("labelScoreNow").textContent = tr.statScoreNow;
      document.getElementById("labelScoreMax").textContent = tr.statScoreMax;
      document.getElementById("labelDone").textContent = tr.statDone;
      document.getElementById("labelMissing").textContent = tr.statMissing;
      document.getElementById("labelProgress").textContent = tr.progressLabel;
      document.getElementById("completionTitle").textContent = tr.completionTitle;
      document.getElementById("sectionGamesTitle").textContent = tr.sectionGamesTitle;
      document.getElementById("sectionGamesSubtitle").textContent = tr.sectionGamesSubtitle;
      document.getElementById("resetButton").textContent = tr.resetButton;
      document.getElementById("abortButton").textContent = tr.abortButton;
      document.getElementById("footerHosted").textContent = tr.footerHosted;
      document.getElementById("footerStorage").textContent = tr.footerStorage;
      document.querySelectorAll(".lang-switch button").forEach(b => {
        b.classList.toggle("active", b.dataset.lang === state.lang);
      });
    }

    function setLanguage(lang) {
      if (lang !== "de" && lang !== "en") return;
      state.lang = lang;
      writeStoredValue(langStorageName(), lang);
      applyStaticI18n();
      const homeActive = document.getElementById("homeView").classList.contains("active");
      if (homeActive) {
        renderHome();
      } else if (state.currentChallengeId) {
        const challenge = getEnabledChallenges().find(x => x.id === state.currentChallengeId);
        if (challenge) {
          const txt = challengeText(challenge);
          document.getElementById("challengeTitle").textContent = txt.title;
          document.getElementById("challengeMeta").textContent = t().challengeMeta(txt.topic, challenge.points);
          const diff = document.getElementById("challengeDifficulty");
          diff.textContent = difficultyLabel(challenge.difficulty);
          diff.className = `difficulty-pill ${challenge.difficulty}`;
        }
        renderQuizQuestion();
      }
    }

    function renderHome() {
      const tr = t();
      const challenges = getEnabledChallenges();
      const progress = loadProgress();
      const done = completedCount();
      const total = challenges.length;
      const missing = total - done;
      const score = currentScore();
      const possible = maxScore();
      const pct = total === 0 ? 0 : Math.round((done / total) * 100);

      document.getElementById("scoreNow").textContent = score;
      document.getElementById("scoreMax").textContent = possible;
      document.getElementById("doneCount").textContent = `${done}/${total}`;
      document.getElementById("missingCount").textContent = missing;
      document.getElementById("progressText").textContent = `${pct}%`;
      document.getElementById("progressFill").style.width = `${pct}%`;

      const completionBox = document.getElementById("completionBox");
      const completionText = document.getElementById("completionText");
      if (total > 0 && done === total) {
        completionBox.classList.add("show");
        completionText.textContent = tr.completionText(score, possible);
      } else {
        completionBox.classList.remove("show");
      }

      const grid = document.getElementById("challengeGrid");
      grid.innerHTML = challenges.map(challenge => {
        const isDone = Boolean(progress[challenge.id]?.completed);
        const achieved = progress[challenge.id]?.points || 0;
        const txt = challengeText(challenge);
        return `
          <article class="challenge-card ${isDone ? "done" : ""}">
            <div class="card-top">
              <div class="icon-badge">${challenge.icon}</div>
              <span class="status-pill ${isDone ? "done" : "open"}">${isDone ? tr.statusDone : tr.statusOpen}</span>
            </div>
            <div>
              <h3>${escapeHtml(txt.title)}</h3>
              <p>${escapeHtml(txt.description)}</p>
            </div>
            <div class="card-meta">
              <span class="difficulty-pill ${challenge.difficulty}">${difficultyLabel(challenge.difficulty)}</span>
              <span class="status-pill">${challenge.points} ${tr.pointsSuffix}</span>
              ${isDone ? `<span class="status-pill done">+${achieved}</span>` : ""}
            </div>
            <button class="btn primary full" type="button" onclick="startChallenge('${challenge.id}')">
              ${isDone ? tr.cardReplay : tr.cardStart}
            </button>
          </article>
        `;
      }).join("");
    }

    function showView(viewName) {
      document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
      const map = { home: "homeView", challenge: "challengeView" };
      const target = document.getElementById(map[viewName]);
      if (target) target.classList.add("active");
      const career = document.getElementById("careerNavButton");
      if (career) career.hidden = viewName === "challenge";
      if (viewName === "home") renderHome();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function startChallenge(id) {
      state.currentChallengeId = id;
      state.quiz = { questionIndex: 0, correct: 0, selectedAnswer: null, answered: false };
      const challenge = getEnabledChallenges().find(c => c.id === id);
      if (!challenge) return;
      const txt = challengeText(challenge);
      document.getElementById("challengeTitle").textContent = txt.title;
      document.getElementById("challengeMeta").textContent = t().challengeMeta(txt.topic, challenge.points);
      const diff = document.getElementById("challengeDifficulty");
      diff.textContent = difficultyLabel(challenge.difficulty);
      diff.className = `difficulty-pill ${challenge.difficulty}`;
      document.getElementById("challengeFeedback").className = "feedback";
      document.getElementById("challengeFeedback").textContent = "";
      document.getElementById("challengeActions").innerHTML = "";
      renderQuizQuestion();
      showView("challenge");
    }

    function getQuizData(id) {
      const entry = choiceChallenges[id];
      if (!entry) return null;
      return entry[state.lang] || entry.de;
    }

    function renderQuizQuestion() {
      const tr = t();
      const id = state.currentChallengeId;
      const data = getQuizData(id);
      if (!data || !Array.isArray(data.questions) || data.questions.length === 0) return;
      const total = data.questions.length;
      const index = state.quiz.questionIndex;
      const question = data.questions[index];
      state.quiz.selectedAnswer = null;
      state.quiz.answered = false;

      document.getElementById("challengeStory").innerHTML = `
        <p>${escapeHtml(data.story)}</p>
        <p class="small-note">${tr.questionProgress(index + 1, total, state.quiz.correct)}</p>
      `;

      document.getElementById("challengeContent").innerHTML = `
        ${question.code ? `<pre><code>${escapeHtml(question.code)}</code></pre>` : ""}
        <h3>${escapeHtml(question.question)}</h3>
        <div class="choice-grid">
          ${question.choices.map((choice, i) => `
            <button class="choice" type="button" onclick="selectChoice(${i})">${escapeHtml(choice)}</button>
          `).join("")}
        </div>
      `;

      document.getElementById("challengeFeedback").className = "feedback";
      document.getElementById("challengeFeedback").textContent = "";
      document.getElementById("challengeActions").innerHTML = `
        <button class="btn primary" type="button" onclick="submitQuizAnswer()">${tr.submitCheck}</button>
        <button class="btn ghost" type="button" onclick="abortChallenge()">${tr.abortButton}</button>
      `;
    }

    function selectChoice(index) {
      if (state.quiz.answered) return;
      state.quiz.selectedAnswer = index;
      document.querySelectorAll(".choice").forEach((b, i) => b.classList.toggle("selected", i === index));
    }

    function submitQuizAnswer() {
      const tr = t();
      const id = state.currentChallengeId;
      const data = getQuizData(id);
      const question = data.questions[state.quiz.questionIndex];
      if (state.quiz.selectedAnswer === null) {
        showFeedback(tr.chooseFirst, "info");
        return;
      }
      state.quiz.answered = true;
      const isCorrect = state.quiz.selectedAnswer === question.correctIndex;
      if (isCorrect) state.quiz.correct += 1;

      document.querySelectorAll(".choice").forEach((b, i) => {
        b.disabled = true;
        if (i === question.correctIndex) b.classList.add("correct");
        if (i === state.quiz.selectedAnswer && !isCorrect) b.classList.add("wrong");
      });

      const explanation = question.successHtml
        ? ` ${question.successHtml}`
        : (question.successText ? ` ${escapeHtml(question.successText)}` : "");
      const prefix = isCorrect ? tr.correctPrefix : tr.wrongPrefix;
      showFeedbackHtml(`${prefix}${explanation}`, isCorrect ? "success" : "error");

      const isLast = state.quiz.questionIndex + 1 >= data.questions.length;
      document.getElementById("challengeActions").innerHTML = isLast
        ? `<button class="btn primary" type="button" onclick="finishQuiz()">${tr.showResult}</button>
           <button class="btn ghost" type="button" onclick="abortChallenge()">${tr.abortButton}</button>`
        : `<button class="btn primary" type="button" onclick="nextQuizQuestion()">${tr.nextQuestion}</button>
           <button class="btn ghost" type="button" onclick="abortChallenge()">${tr.abortButton}</button>`;
    }

    function nextQuizQuestion() {
      state.quiz.questionIndex += 1;
      renderQuizQuestion();
    }

    function finishQuiz() {
      const tr = t();
      const id = state.currentChallengeId;
      const challenge = getEnabledChallenges().find(c => c.id === id);
      const data = getQuizData(id);
      const total = data.questions.length;
      const correct = state.quiz.correct;
      const ratio = total === 0 ? 0 : correct / total;
      const baseEarned = Math.round(challenge.points * ratio);
      const participation = Math.floor(challenge.points * 0.2);
      const earned = Math.max(baseEarned, correct > 0 ? participation : 0);

      markCompleted(challenge.id, earned);

      document.getElementById("challengeStory").innerHTML = `<p>${tr.finishSummary(correct, total)}</p>`;
      document.getElementById("challengeContent").innerHTML = "";
      const tone = ratio >= 0.7 ? "success" : (ratio >= 0.4 ? "info" : "error");
      showFeedback(tr.finishedMessage(earned, challenge.points), tone);
      document.getElementById("challengeActions").innerHTML = `
        <button class="btn primary" type="button" onclick="showView('home')">${tr.backHome}</button>
      `;
    }

    function markCompleted(id, points) {
      const progress = loadProgress();
      const prev = progress[id]?.points || 0;
      progress[id] = {
        completed: true,
        points: Math.max(prev, points),
        completedAt: new Date().toISOString()
      };
      saveProgress(progress);
    }

    function showFeedback(message, type) {
      const f = document.getElementById("challengeFeedback");
      f.textContent = message;
      f.className = `feedback show ${type}`;
    }
    function showFeedbackHtml(html, type) {
      const f = document.getElementById("challengeFeedback");
      f.innerHTML = html;
      f.className = `feedback show ${type}`;
    }

    function abortChallenge() {
      state.currentChallengeId = null;
      showView("home");
    }

    function resetProgress() {
      const confirmed = confirm(t().resetConfirm);
      if (!confirmed) return;
      removeStoredValue(progressStorageName());
      renderHome();
    }

    // Boot
    state.lang = detectInitialLang();
    applyBranding();
    applyStaticI18n();
    renderHome();
  </script>

</body>
</html>
